---
- name: Debug auth key
  ansible.builtin.debug:
    msg: "auth key = '{{ tailscale_auth_key | default('NON DEFINIE') }}'"

- name: Vérifier que tailscale_auth_key est défini
  ansible.builtin.fail:
    msg: "tailscale_auth_key doit être défini. Générer une clé sur https://login.tailscale.com/admin/settings/keys"
  when: tailscale_auth_key is not defined or tailscale_auth_key | length == 0

- name: Installer les dépendances
  ansible.builtin.package:
    name:
      - curl
      - gnupg
      - apt-transport-https
    state: present
  when: ansible_os_family == "Debian"

- name: Ajouter la clé GPG Tailscale
  ansible.builtin.apt_key:
    url: https://pkgs.tailscale.com/stable/ubuntu/focal.gpg
    state: present
  when: ansible_os_family == "Debian"

- name: Ajouter le dépôt Tailscale (Debian/Ubuntu)
  ansible.builtin.apt_repository:
    repo: "deb https://pkgs.tailscale.com/stable/{{ ansible_distribution | lower }} {{ ansible_distribution_release }} main"
    state: present
    filename: tailscale
  when: ansible_os_family == "Debian"

- name: Installer Tailscale
  ansible.builtin.package:
    name: "{{ 'tailscale' if tailscale_version == 'latest' else 'tailscale=' + tailscale_version }}"
    state: "{{ 'latest' if tailscale_version == 'latest' else 'present' }}"
    update_cache: true

- name: Activer et démarrer le service tailscaled
  ansible.builtin.systemd:
    name: tailscaled
    enabled: true
    state: started

- name: Vérifier si le nœud est déjà authentifié
  ansible.builtin.command: tailscale status --json
  register: tailscale_status
  changed_when: false
  failed_when: false

- name: Parser le statut Tailscale
  ansible.builtin.set_fact:
    tailscale_logged_in: "{{ (tailscale_status.stdout | from_json).BackendState == 'Running' }}"
  when: tailscale_status.rc == 0

- name: Construire les arguments tailscale up
  ansible.builtin.set_fact:
    tailscale_up_args: >-
      --authkey={{ tailscale_auth_key }}
      {% if tailscale_hostname != '' %}--hostname={{ tailscale_hostname }}{% endif %}
      {% if tailscale_tags != '' %}--advertise-tags={{ tailscale_tags }}{% endif %}
      {% if tailscale_advertise_routes != '' %}--advertise-routes={{ tailscale_advertise_routes }}{% endif %}
      {% if tailscale_accept_routes %}--accept-routes{% endif %}
      {% if tailscale_accept_dns %}--accept-dns{% endif %}

- name: Authentifier le nœud sur le tailnet
  ansible.builtin.command: "tailscale up {{ tailscale_up_args }}"
  when: not tailscale_logged_in | default(false)
  notify: Vérifier le statut Tailscale

- name: Récupérer l'IP Tailscale du nœud
  ansible.builtin.command: tailscale ip -4
  register: tailscale_ip
  changed_when: false

- name: Afficher l'IP Tailscale
  ansible.builtin.debug:
    msg: "{{ inventory_hostname }} → IP Tailscale : {{ tailscale_ip.stdout }}"
